<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keye</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
      color: #111;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SEARCH VIEW ── */
    #search-view {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wordmark {
      font-size: 20px;
      font-weight: 650;
      letter-spacing: -0.03em;
      margin-bottom: 52px;
      color: #111;
    }

    .search-prompt {
      font-size: 30px;
      font-weight: 500;
      letter-spacing: -0.03em;
      color: #111;
      margin-bottom: 20px;
    }

    .search-form {
      width: 100%;
      max-width: 460px;
      position: relative;
    }

    .search-input {
      width: 100%;
      font-size: 15px;
      padding: 13px 48px 13px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      outline: none;
      font-family: inherit;
      color: #111;
      transition: border-color 0.15s;
      background: #fafafa;
    }
    .search-input:focus { border-color: #111; background: #fff; }
    .search-input::placeholder { color: #bbb; }

    .search-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: #111;
      border: none;
      border-radius: 8px;
      color: #fff;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .search-btn:hover { background: #333; }

    /* ── LOADING VIEW ── */
    #loading-view {
      height: 100vh;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .loading-text {
      font-size: 16px;
      color: #888;
      font-weight: 450;
    }

    .dots { display: flex; gap: 5px; }
    .dot {
      width: 5px; height: 5px;
      background: #ccc;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.7); }
      40%            { opacity: 1;   transform: scale(1);   }
    }

    /* ── RESULTS VIEW ── */
    #results-view {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    .results-header {
      border-bottom: 1px solid #f0f0f0;
      padding: 0 24px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-inner {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-wordmark {
      font-size: 16px;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .new-search-btn {
      font-size: 12px;
      color: #888;
      background: none;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 5px 11px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .new-search-btn:hover { color: #111; border-color: #bbb; }

    /* scrollable body */
    #results-body {
      flex: 1;
      overflow-y: auto;
      padding: 36px 24px 0;
    }

    .results-body-inner {
      max-width: 680px;
      margin: 0 auto;
      padding-bottom: 24px;
    }

    .firm-name {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.025em;
      margin-bottom: 28px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 10px;
    }

    /* summary bullets */
    .summary-list { list-style: none; margin-bottom: 32px; }
    .summary-list li {
      font-size: 14px;
      line-height: 1.65;
      color: #222;
      padding: 9px 0 9px 16px;
      border-bottom: 1px solid #f5f5f5;
      position: relative;
    }
    .summary-list li:last-child { border-bottom: none; }
    .summary-list li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: #ccc;
    }

    /* meeting items */
    .meetings-list { list-style: none; margin-bottom: 36px; }
    .meeting-item {
      padding: 10px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .meeting-item:last-child { border-bottom: none; }
    .meeting-date {
      font-size: 13px;
      font-weight: 600;
      color: #111;
      display: block;
      margin-bottom: 2px;
    }
    .meeting-title {
      font-size: 13px;
      color: #555;
      display: block;
      margin-bottom: 3px;
    }
    .meeting-attendees {
      font-size: 12px;
      color: #aaa;
    }

    .none-text { color: #bbb; font-size: 13px; }

    /* chat divider */
    .chat-divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 0 0 24px;
    }

    /* chat messages */
    #chat-messages {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 8px;
    }

    .message {
      max-width: 82%;
      font-size: 14px;
      line-height: 1.55;
      padding: 10px 14px;
      animation: fadeUp 0.18s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: #111;
      color: #fff;
      border-radius: 16px 16px 3px 16px;
    }
    .message.assistant {
      align-self: flex-start;
      background: #f5f5f5;
      color: #111;
      border-radius: 16px 16px 16px 3px;
    }
    .message.thinking {
      align-self: flex-start;
      background: #f5f5f5;
      border-radius: 16px;
      padding: 12px 16px;
    }

    /* chat input bar */
    .chat-input-wrap {
      border-top: 1px solid #f0f0f0;
      padding: 12px 24px;
      background: #fff;
      flex-shrink: 0;
    }
    .chat-input-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #chat-input {
      flex: 1;
      font-size: 14px;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      outline: none;
      font-family: inherit;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.45;
      transition: border-color 0.15s;
      color: #111;
    }
    #chat-input:focus { border-color: #111; }
    #chat-input::placeholder { color: #bbb; }

    #send-btn {
      width: 38px;
      height: 38px;
      background: #111;
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #send-btn:hover { background: #333; }
    #send-btn:disabled { background: #d0d0d0; cursor: default; }
  </style>
</head>
<body>

  <!-- Search -->
  <div id="search-view">
    <div class="wordmark">Keye</div>
    <div class="search-prompt">Who are we talking to?</div>
    <form class="search-form" onsubmit="handleSearch(event)">
      <input id="firm-input" class="search-input" type="text"
             placeholder="Enter a firm name..." autocomplete="off" autofocus />
      <button type="submit" class="search-btn">→</button>
    </form>
  </div>

  <!-- Loading -->
  <div id="loading-view">
    <div id="loading-text" class="loading-text">Looking up...</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- Results + Chat -->
  <div id="results-view">
    <div class="results-header">
      <div class="header-inner">
        <span class="header-wordmark">Keye</span>
        <button class="new-search-btn" onclick="newSearch()">← New search</button>
      </div>
    </div>

    <div id="results-body">
      <div class="results-body-inner">
        <div id="firm-name" class="firm-name"></div>

        <div class="section-label">Email History</div>
        <ul id="summary-list" class="summary-list"></ul>

        <div class="section-label">Meeting History</div>
        <ul id="meetings-list" class="meetings-list"></ul>

        <hr class="chat-divider">
        <div id="chat-messages"></div>
      </div>
    </div>

    <div class="chat-input-wrap">
      <div class="chat-input-inner">
        <textarea id="chat-input" placeholder="Ask anything..."
                  rows="1"
                  onkeydown="handleChatKey(event)"
                  oninput="autoResize(this)"></textarea>
        <button id="send-btn" onclick="sendMessage()">↑</button>
      </div>
    </div>
  </div>

  <script>
    let context = null;
    let messages = [];

    function show(view) {
      document.getElementById('search-view').style.display  = view === 'search-view'  ? 'flex'   : 'none';
      document.getElementById('loading-view').style.display = view === 'loading-view' ? 'flex'   : 'none';
      document.getElementById('results-view').style.display = view === 'results-view' ? 'flex'   : 'none';
    }

    show('search-view');

    async function handleSearch(e) {
      e.preventDefault();
      const firm = document.getElementById('firm-input').value.trim();
      if (!firm) return;

      document.getElementById('loading-text').textContent = `Looking up ${firm}...`;
      show('loading-view');

      try {
        const res = await fetch('/api/lookup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ firm }),
        });
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        renderResults(await res.json());
      } catch (err) {
        show('search-view');
        alert('Error: ' + err.message);
      }
    }

    function renderResults(data) {
      context = {
        firm: data.firm,
        summary: data.summary,
        emails: data.emails,
        calendarEvents: data.calendarEvents,
      };
      messages = [];

      document.getElementById('firm-name').textContent = data.firm;

      // Email History
      const summaryList = document.getElementById('summary-list');
      summaryList.innerHTML = '';
      if (data.summary) {
        data.summary.split('\n').filter(l => l.trim()).forEach(line => {
          const li = document.createElement('li');
          li.textContent = line.replace(/^-\s*/, '');
          summaryList.appendChild(li);
        });
      } else {
        const li = document.createElement('li');
        li.className = 'none-text';
        li.textContent = 'No email history found.';
        summaryList.appendChild(li);
      }

      // Meeting History
      const meetingsList = document.getElementById('meetings-list');
      meetingsList.innerHTML = '';
      if (data.calendarEvents && data.calendarEvents.length > 0) {
        data.calendarEvents.slice(0, 10).forEach(e => {
          const li = document.createElement('li');
          li.className = 'meeting-item';
          const date = new Date(e.start).toLocaleDateString('en-US', {
            weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
            hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York',
          });
          const attendees = e.attendees.map(a => a.name || a.email).join(', ');
          li.innerHTML = `
            <span class="meeting-date">${date}</span>
            <span class="meeting-title">${e.title}</span>
            <span class="meeting-attendees">${attendees}</span>
          `;
          meetingsList.appendChild(li);
        });
      } else {
        const li = document.createElement('li');
        li.className = 'meeting-item none-text';
        li.textContent = 'No meetings found.';
        meetingsList.appendChild(li);
      }

      // Initial assistant message
      document.getElementById('chat-messages').innerHTML = '';
      appendMessage('assistant', `Loaded history for ${data.firm}. What would you like to know?`);

      show('results-view');
      setTimeout(() => document.getElementById('chat-input').focus(), 100);
    }

    function appendMessage(role, text) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      if (role === 'assistant') {
        div.innerHTML = marked.parse(text);
      } else {
        div.textContent = text;
      }
      document.getElementById('chat-messages').appendChild(div);
      scrollToBottom();
      return div;
    }

    function scrollToBottom() {
      const body = document.getElementById('results-body');
      body.scrollTop = body.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || !context) return;

      input.value = '';
      input.style.height = 'auto';
      document.getElementById('send-btn').disabled = true;

      appendMessage('user', text);
      messages.push({ role: 'user', content: text });

      // Thinking indicator
      const thinking = document.createElement('div');
      thinking.className = 'message thinking';
      thinking.innerHTML = '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
      document.getElementById('chat-messages').appendChild(thinking);
      scrollToBottom();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages, context }),
        });
        const data = await res.json();
        thinking.remove();
        const answer = data.answer || 'No response.';
        messages.push({ role: 'assistant', content: answer });
        appendMessage('assistant', answer);
      } catch (err) {
        thinking.remove();
        appendMessage('assistant', 'Error: ' + err.message);
      }

      document.getElementById('send-btn').disabled = false;
      input.focus();
    }

    function handleChatKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function newSearch() {
      context = null;
      messages = [];
      document.getElementById('firm-input').value = '';
      show('search-view');
      document.getElementById('firm-input').focus();
    }
  </script>
</body>
</html>
