<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keye</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:       #0c0c0c;
      --surface:  #141414;
      --border:   #1e1e1e;
      --border-2: #2a2a2a;
      --text:     #e0e0e0;
      --text-2:   #777;
      --text-3:   #3a3a3a;
      --accent:   #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      height: 46px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .wordmark {
      font-size: 14px;
      font-weight: 650;
      letter-spacing: -0.01em;
      color: var(--accent);
    }

    #firm-badge {
      font-size: 12px;
      color: var(--text-2);
      letter-spacing: -0.01em;
      display: none;
    }

    #new-search-btn {
      font-size: 12px;
      color: var(--text-2);
      background: none;
      border: 1px solid var(--border-2);
      padding: 4px 11px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      display: none;
    }
    #new-search-btn:hover { color: var(--text); border-color: #444; }

    /* ── Main scroll area ── */
    #main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    #main::-webkit-scrollbar { width: 3px; }
    #main::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    /* ── Empty state ── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 24px;
      color: var(--text-2);
    }
    #empty-state p { font-size: 15px; font-weight: 450; letter-spacing: -0.02em; }
    #empty-state span { font-size: 13px; color: var(--text-3); }

    /* ── Messages ── */
    #messages {
      display: none;
      flex-direction: column;
      gap: 28px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 28px 20px 12px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      animation: msgIn 0.22s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user  { align-items: flex-end; }
    .msg.assistant { align-items: flex-start; width: 100%; }

    .msg-bubble {
      font-size: 14px;
      line-height: 1.65;
    }

    .msg.user .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border-2);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px 12px 3px 12px;
      max-width: 80%;
    }

    .msg.assistant .msg-bubble {
      color: var(--text);
      width: 100%;
    }

    /* Markdown in assistant bubbles */
    .msg.assistant .msg-bubble p         { margin-bottom: 10px; }
    .msg.assistant .msg-bubble p:last-child { margin-bottom: 0; }
    .msg.assistant .msg-bubble ul,
    .msg.assistant .msg-bubble ol        { padding-left: 18px; margin-bottom: 10px; }
    .msg.assistant .msg-bubble li        { margin-bottom: 5px; }
    .msg.assistant .msg-bubble strong    { color: var(--accent); }
    .msg.assistant .msg-bubble em        { color: var(--text-2); }

    /* ── Result card ── */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      width: 100%;
    }

    .result-firm {
      padding: 16px 20px;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.025em;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
    }

    .result-section {
      padding: 14px 20px;
    }
    .result-section + .result-section {
      border-top: 1px solid var(--border);
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 12px;
    }

    .bullet-list {
      list-style: none;
      display: flex;
      flex-direction: column;
    }

    .bullet-list li {
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--text);
      padding: 8px 0 8px 14px;
      position: relative;
      border-bottom: 1px solid var(--border);
    }
    .bullet-list li:last-child { border-bottom: none; padding-bottom: 0; }
    .bullet-list li:first-child { padding-top: 0; }
    .bullet-list li::before {
      content: '';
      position: absolute;
      left: 0; top: 15px;
      width: 3px; height: 3px;
      background: var(--text-3);
      border-radius: 50%;
    }

    .meeting-item {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .meeting-item:last-child { border-bottom: none; padding-bottom: 0; }
    .meeting-item:first-child { padding-top: 0; }

    .meeting-date   { font-size: 12px; font-weight: 600; color: var(--text); display: block; margin-bottom: 2px; }
    .meeting-title  { font-size: 12px; color: var(--text-2); display: block; margin-bottom: 2px; }
    .meeting-people { font-size: 11px; color: var(--text-3); }

    .no-data { font-size: 13px; color: var(--text-3); font-style: italic; }

    /* ── Thinking chain (during lookup) ── */
    .think-chain {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 4px 0;
    }

    .think-step {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-3);
      animation: stepIn 0.3s ease;
    }
    @keyframes stepIn {
      from { opacity: 0; transform: translateX(-5px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .think-step.active { color: var(--text-2); }

    .think-indicator {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--text-3);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .think-step.active .think-indicator {
      background: var(--text-2);
      animation: glow 1.2s infinite;
    }
    @keyframes glow {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1; }
    }

    /* ── Chat thinking dots ── */
    .chat-dots {
      display: flex;
      gap: 5px;
      padding: 6px 0;
    }
    .chat-dots span {
      width: 4px; height: 4px;
      background: var(--text-3);
      border-radius: 50%;
      display: block;
      animation: dotBounce 1.2s infinite;
    }
    .chat-dots span:nth-child(2) { animation-delay: 0.2s; }
    .chat-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%, 80%, 100% { opacity: 0.2; }
      40%           { opacity: 0.9; }
    }

    /* ── Input bar ── */
    .input-bar {
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      background: var(--bg);
      flex-shrink: 0;
    }
    .input-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #main-input {
      flex: 1;
      font-size: 14px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      outline: none;
      color: var(--text);
      font-family: inherit;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #main-input::placeholder { color: var(--text-3); }
    #main-input:focus { border-color: #333; }

    #send-btn {
      width: 38px; height: 38px;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 9px;
      color: var(--text-2);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    #send-btn:hover:not(:disabled) { color: var(--text); border-color: #3a3a3a; }
    #send-btn:disabled { opacity: 0.25; cursor: default; }
  </style>
</head>
<body>

<header>
  <span class="wordmark">Keye</span>
  <span id="firm-badge"></span>
  <button id="new-search-btn" onclick="newSearch()">New search</button>
</header>

<div id="main">
  <div id="empty-state">
    <p>Who are we talking to?</p>
    <span>Enter a firm name below</span>
  </div>
  <div id="messages"></div>
</div>

<div class="input-bar">
  <div class="input-inner">
    <textarea id="main-input" placeholder="Enter a firm name..."
              rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="handleSend()">↑</button>
  </div>
</div>

<script>
  marked.setOptions({ breaks: true });

  let context = null;
  let chatMessages = [];
  let isLoading = false;

  const input    = document.getElementById('main-input');
  const sendBtn  = document.getElementById('send-btn');
  const msgArea  = document.getElementById('messages');
  const emptyEl  = document.getElementById('empty-state');
  const firmBadge   = document.getElementById('firm-badge');
  const newSrchBtn  = document.getElementById('new-search-btn');

  input.focus();

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  }
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
  function handleSend() {
    if (isLoading) return;
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    context ? doChat(text) : doLookup(text);
  }

  function scrollBottom() {
    const main = document.getElementById('main');
    main.scrollTop = main.scrollHeight;
  }

  function showMessages() {
    emptyEl.style.display = 'none';
    msgArea.style.display = 'flex';
  }

  // Add a message row and return it
  function addMsg(role, content) {
    showMessages();
    const row = document.createElement('div');
    row.className = `msg ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    if (role === 'user') {
      bubble.textContent = content;
    } else if (typeof content === 'string') {
      bubble.innerHTML = marked.parse(content);
    } else {
      bubble.appendChild(content); // DOM element
    }

    row.appendChild(bubble);
    msgArea.appendChild(row);
    scrollBottom();
    return row;
  }

  // ── Lookup ───────────────────────────────────────────────
  const STEPS = [
    "Searching Gmail across 6 accounts",
    "Reading email threads",
    "Scanning calendar history",
    "Identifying key contacts",
    "Analyzing with Claude",
  ];

  async function doLookup(firm) {
    isLoading = true;
    sendBtn.disabled = true;
    input.placeholder = 'Looking up...';

    addMsg('user', firm);

    // Chain of thought
    const chain = document.createElement('div');
    chain.className = 'think-chain';
    const chainRow = addMsg('assistant', chain);

    let stepEls = [];
    let cancelled = false;

    STEPS.forEach((label, i) => {
      setTimeout(() => {
        if (cancelled) return;
        if (stepEls[i - 1]) stepEls[i - 1].classList.remove('active');
        const step = document.createElement('div');
        step.className = 'think-step active';
        step.innerHTML = `<div class="think-indicator"></div><span>${label}</span>`;
        chain.appendChild(step);
        stepEls.push(step);
        scrollBottom();
      }, i * 2400);
    });

    try {
      const res = await fetch('/api/lookup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ firm }),
      });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();

      cancelled = true;
      chainRow.remove();
      renderResultCard(data);

      context = { firm: data.firm, summary: data.summary, emails: data.emails, calendarEvents: data.calendarEvents };
      chatMessages = [];

      firmBadge.textContent = data.firm;
      firmBadge.style.display = 'block';
      newSrchBtn.style.display = 'block';
      input.placeholder = `Ask anything about ${data.firm}...`;

    } catch (err) {
      cancelled = true;
      chainRow.remove();
      addMsg('assistant', `Error looking up **${firm}**: ${err.message}`);
      input.placeholder = 'Enter a firm name...';
    }

    isLoading = false;
    sendBtn.disabled = false;
    input.focus();
  }

  function renderResultCard(data) {
    const card = document.createElement('div');
    card.className = 'result-card';

    // Firm name
    const firmEl = document.createElement('div');
    firmEl.className = 'result-firm';
    firmEl.textContent = data.firm;
    card.appendChild(firmEl);

    // Email History
    const emailSec = document.createElement('div');
    emailSec.className = 'result-section';
    emailSec.innerHTML = '<div class="section-label">Email History</div>';
    const ul = document.createElement('ul');
    ul.className = 'bullet-list';
    if (data.summary) {
      data.summary.split('\n').filter(l => l.trim()).forEach(line => {
        const li = document.createElement('li');
        li.textContent = line.replace(/^-\s*/, '');
        ul.appendChild(li);
      });
    } else {
      ul.innerHTML = '<li class="no-data">No email history found.</li>';
    }
    emailSec.appendChild(ul);
    card.appendChild(emailSec);

    // Meeting History
    const meetSec = document.createElement('div');
    meetSec.className = 'result-section';
    meetSec.innerHTML = '<div class="section-label">Meeting History</div>';
    if (data.calendarEvents?.length) {
      data.calendarEvents.slice(0, 10).forEach(e => {
        const item = document.createElement('div');
        item.className = 'meeting-item';
        const date = new Date(e.start).toLocaleDateString('en-US', {
          weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
          hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York',
        });
        item.innerHTML = `
          <span class="meeting-date">${date}</span>
          <span class="meeting-title">${e.title}</span>
          <span class="meeting-people">${e.attendees.map(a => a.name || a.email).join(', ')}</span>
        `;
        meetSec.appendChild(item);
      });
    } else {
      meetSec.innerHTML += '<p class="no-data">No meetings found.</p>';
    }
    card.appendChild(meetSec);

    addMsg('assistant', card);
  }

  // ── Chat ─────────────────────────────────────────────────
  async function doChat(text) {
    isLoading = true;
    sendBtn.disabled = true;

    addMsg('user', text);
    chatMessages.push({ role: 'user', content: text });

    const dots = document.createElement('div');
    dots.className = 'chat-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';
    const dotsRow = addMsg('assistant', dots);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: chatMessages, context }),
      });
      const data = await res.json();
      dotsRow.remove();

      const answer = data.answer || 'No response.';
      chatMessages.push({ role: 'assistant', content: answer });
      addMsg('assistant', answer);
    } catch (err) {
      dotsRow.remove();
      addMsg('assistant', `Error: ${err.message}`);
    }

    isLoading = false;
    sendBtn.disabled = false;
    input.focus();
  }

  // ── Reset ────────────────────────────────────────────────
  function newSearch() {
    context = null;
    chatMessages = [];
    msgArea.innerHTML = '';
    msgArea.style.display = 'none';
    emptyEl.style.display = 'flex';
    firmBadge.style.display = 'none';
    newSrchBtn.style.display = 'none';
    input.placeholder = 'Enter a firm name...';
    input.focus();
  }
</script>
</body>
</html>
