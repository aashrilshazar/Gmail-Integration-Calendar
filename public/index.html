<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keye</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:        #0c0c0c;
      --surface:   #141414;
      --sidebar:   #101010;
      --border:    #1e1e1e;
      --border-2:  #2a2a2a;
      --text:      #e0e0e0;
      --text-2:    #777;
      --text-3:    #3a3a3a;
      --accent:    #ffffff;
      --sb-w:      52px;
      --sb-w-open: 220px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    a { color: #6ab3f8; }
    a:hover { color: #93cbfc; }

    /* ── Header ── */
    header {
      height: 46px;
      padding: 0 16px 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: var(--sb-w);
      height: 100%;
      flex-shrink: 0;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 0 0 4em;
      transition: width 0.22s ease;
    }
    #sidebar.open ~ #content-col header .logo-btn,
    body.sb-open .logo-btn { width: var(--sb-w-open); }

    .logo-img {
      height: 33px;
      width: auto;
      display: block;
    }

    #firm-badge {
      font-size: 12px;
      color: var(--text-2);
      letter-spacing: -0.01em;
      display: none;
    }

    /* spacer so badge stays centered */
    .header-right { width: var(--sb-w); flex-shrink: 0; }

    /* ── App body ── */
    #app-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sb-w);
      min-width: var(--sb-w);
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: width 0.22s ease, min-width 0.22s ease;
      overflow: hidden;
      flex-shrink: 0;
    }
    #sidebar.open {
      width: var(--sb-w-open);
      min-width: var(--sb-w-open);
    }

    .sb-nav { display: flex; flex-direction: column; padding: 6px 0; }

    .sb-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 14px;
      width: 100%;
      background: none;
      border: none;
      color: var(--text-2);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      text-align: left;
      white-space: nowrap;
      transition: color 0.15s, background 0.15s;
    }
    .sb-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }

    .sb-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .sb-label {
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }
    #sidebar.open .sb-label { opacity: 1; }

    .sb-divider {
      height: 1px;
      background: var(--border);
      margin: 6px 0;
    }

    .sb-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      padding: 10px 14px 4px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.15s;
    }
    #sidebar.open .sb-section-label { opacity: 1; }

    .sb-recents {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .sb-recents::-webkit-scrollbar { width: 2px; }
    .sb-recents::-webkit-scrollbar-thumb { background: #222; }

    #sb-filter {
      display: none;
      width: calc(100% - 28px);
      margin: 4px 14px 6px;
      padding: 5px 10px;
      font-size: 12px;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      outline: none;
    }
    #sidebar.open #sb-filter { display: block; }
    #sb-filter::placeholder { color: var(--text-3); }

    .sb-recent-item {
      display: block;
      width: 100%;
      padding: 6px 14px 6px 50px;
      font-size: 12px;
      color: var(--text-2);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: none;
      border: none;
      font-family: inherit;
      text-align: left;
      opacity: 0;
      transition: color 0.15s, opacity 0.15s;
    }
    #sidebar.open .sb-recent-item { opacity: 1; }
    .sb-recent-item:hover { color: var(--text); }

    /* ── Content column ── */
    #content-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Content header ── */
    #content-header {
      height: 46px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Main scroll area ── */
    #main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    #main::-webkit-scrollbar { width: 3px; }
    #main::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    /* ── Empty state ── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
      color: var(--text-2);
    }
    #empty-state > p {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #ffffff;
    }

    /* ── Landing input area ── */
    #landing-input-area {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 8px;
    }

    #landing-textarea {
      flex: 1;
      font-size: 15px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #landing-textarea::placeholder { color: var(--text-3); }
    #landing-textarea:focus { border-color: #333; }

    #landing-send-btn {
      width: 38px;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 9px;
      color: var(--text-2);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    #landing-send-btn:hover:not(:disabled) { color: var(--text); border-color: #3a3a3a; }
    #landing-send-btn:disabled { opacity: 0.25; cursor: default; }

    /* ── Messages ── */
    #messages {
      display: none;
      flex-direction: column;
      gap: 28px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 28px 20px 12px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      animation: msgIn 0.22s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user      { align-items: flex-end; }
    .msg.assistant { align-items: flex-start; width: 100%; }

    .msg-bubble {
      font-size: 14px;
      line-height: 1.65;
    }

    .msg.user .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border-2);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px 12px 3px 12px;
      max-width: 80%;
    }

    .msg.assistant .msg-bubble {
      color: var(--text);
      width: 100%;
    }

    .msg.assistant .msg-bubble p            { margin-bottom: 10px; }
    .msg.assistant .msg-bubble p:last-child { margin-bottom: 0; }
    .msg.assistant .msg-bubble ul,
    .msg.assistant .msg-bubble ol           { padding-left: 18px; margin-bottom: 10px; }
    .msg.assistant .msg-bubble li           { margin-bottom: 5px; }
    .msg.assistant .msg-bubble strong       { color: var(--accent); }
    .msg.assistant .msg-bubble em           { color: var(--text-2); }
    .msg.assistant .msg-bubble h1,
    .msg.assistant .msg-bubble h2,
    .msg.assistant .msg-bubble h3           { color: var(--accent); margin: 14px 0 6px; }
    .msg.assistant .msg-bubble h1           { font-size: 15px; }
    .msg.assistant .msg-bubble h2           { font-size: 13px; }
    .msg.assistant .msg-bubble h3           { font-size: 12px; font-weight: 600; }
    .msg.assistant .msg-bubble hr           { border: none; border-top: 1px solid var(--border-2); margin: 12px 0; }
    .msg.assistant .msg-bubble blockquote   { border-left: 2px solid var(--border-2); padding-left: 12px; color: var(--text-2); margin: 8px 0; }
    .msg.assistant .msg-bubble code         { font-family: "SF Mono", monospace; font-size: 12px; background: #1e1e1e; color: #c8d3f5; padding: 1px 5px; border-radius: 4px; }
    .msg.assistant .msg-bubble pre          { background: #1a1a1a; border: 1px solid var(--border-2); border-radius: 8px; padding: 12px 14px; margin: 10px 0; overflow-x: auto; }
    .msg.assistant .msg-bubble pre code     { background: none; padding: 0; }
    .msg.assistant .msg-bubble table        { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
    .msg.assistant .msg-bubble th           { text-align: left; padding: 7px 12px; font-weight: 600; color: var(--accent); background: #1a1a1a; border: 1px solid var(--border-2); }
    .msg.assistant .msg-bubble td           { padding: 7px 12px; color: var(--text); border: 1px solid var(--border-2); vertical-align: top; }
    .msg.assistant .msg-bubble tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    /* ── Result card ── */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      width: 100%;
    }

    .result-firm {
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.025em;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .copy-btn {
      font-size: 11px;
      color: var(--text-3);
      background: none;
      border: 1px solid var(--border-2);
      padding: 3px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .copy-btn:hover { color: var(--text-2); border-color: #3a3a3a; }

    .status-bar {
      padding: 8px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-2);
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); flex-shrink: 0; }

    .result-section { padding: 14px 20px; }
    .result-section + .result-section { border-top: 1px solid var(--border); }
    .result-section table  { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
    .result-section th     { text-align: left; padding: 7px 12px; font-weight: 600; color: var(--accent); background: #1a1a1a; border: 1px solid var(--border-2); }
    .result-section td     { padding: 7px 12px; color: var(--text); border: 1px solid var(--border-2); vertical-align: top; }
    .result-section tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 12px;
    }

    /* ── Timeline ── */
    .timeline { position: relative; padding-left: 20px; }
    .timeline::before { content: ''; position: absolute; left: 5px; top: 8px; bottom: 8px; width: 1px; background: var(--border-2); }
    .timeline-item { position: relative; padding: 7px 0 7px 12px; border-bottom: 1px solid var(--border); }
    .timeline-item:last-child  { border-bottom: none; padding-bottom: 0; }
    .timeline-item:first-child { padding-top: 0; }
    .tl-dot { position: absolute; left: -15px; top: 13px; width: 5px; height: 5px; border-radius: 50%; background: var(--text-3); flex-shrink: 0; }
    .tl-date { font-size: 11px; font-weight: 700; color: var(--accent); display: block; margin-bottom: 2px; }
    .tl-text { font-size: 13px; line-height: 1.55; color: var(--text); }

    /* ── Collapsible meetings ── */
    .collapsible-header {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .collapsible-header:hover { background: rgba(255,255,255,0.04); }
    .collapsible-chevron { font-size: 11px; color: var(--text-2); transition: transform 0.2s; margin-left: 8px; }
    .collapsible-header[data-open="true"] .collapsible-chevron { transform: rotate(90deg); }
    .collapsible-hint { font-size: 10px; color: var(--text-3); letter-spacing: 0.02em; }
    .collapsible-body { display: none; padding: 0 20px 14px; }
    .collapsible-body.open { display: block; }

    .meeting-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
    .meeting-item:last-child  { border-bottom: none; padding-bottom: 0; }
    .meeting-item:first-child { padding-top: 0; }
    .meeting-date   { font-size: 12px; font-weight: 600; color: var(--text); display: block; margin-bottom: 2px; }
    .meeting-title  { font-size: 12px; color: var(--text-2); display: block; margin-bottom: 2px; }
    .meeting-people { font-size: 11px; color: var(--text-3); }
    .no-data { font-size: 13px; color: var(--text-3); font-style: italic; }

    /* ── Thinking chain ── */
    .think-chain { display: flex; flex-direction: column; gap: 10px; padding: 4px 0; }
    .think-step { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-3); animation: stepIn 0.3s ease; }
    @keyframes stepIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
    .think-step.active { color: var(--text-2); }
    .think-indicator { width: 5px; height: 5px; border-radius: 50%; background: var(--text-3); flex-shrink: 0; }
    .think-step.active .think-indicator { background: var(--text-2); animation: glow 1.2s infinite; }
    @keyframes glow { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    /* ── Chat dots ── */
    .chat-dots { display: flex; gap: 5px; padding: 6px 0; }
    .chat-dots span { width: 5px; height: 5px; background: #ccc; border-radius: 50%; display: block; animation: dotBounce 1.2s infinite; }
    .chat-dots span:nth-child(2) { animation-delay: 0.2s; }
    .chat-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

    /* ── Search tip ── */
    .search-tip {
      font-size: 12px;
      color: var(--text-3);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      line-height: 1.6;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 10px 20px;
    }
    .search-tip-icon { flex-shrink: 0; font-size: 14px; opacity: 0.5; margin-top: 1px; }
    .search-tip code { color: var(--text-2); font-family: "SF Mono", monospace; font-size: 11px; background: #1e1e1e; padding: 1px 5px; border-radius: 3px; }

    /* ── Search result label ── */
    .search-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; }

    /* ── Suggestion chips ── */
    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-width: 720px;
      width: 100%;
      margin: -16px auto 0;
      padding: 0 20px;
    }
    .chip {
      font-size: 12px;
      color: var(--text-2);
      background: var(--surface);
      border: 1px solid var(--border-2);
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .chip:hover { color: var(--text); border-color: #444; }

    /* ── Bottom input bar ── */
    .input-bar {
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      background: var(--bg);
      flex-shrink: 0;
    }
    .input-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #main-input {
      flex: 1;
      font-size: 14px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      outline: none;
      color: var(--text);
      font-family: inherit;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #main-input::placeholder { color: var(--text-3); }
    #main-input:focus { border-color: #333; }

    #send-btn {
      width: 38px; height: 38px;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 9px;
      color: var(--text-2);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    #send-btn:hover:not(:disabled) { color: var(--text); border-color: #3a3a3a; }
    #send-btn:disabled { opacity: 0.25; cursor: default; }
  </style>
</head>
<body>

<!-- Single top header row: logo lives in sidebar-width zone, badge centered, spacer right -->
<header>
  <button class="logo-btn" onclick="newSearch()" title="New search">
    <img src="keye-logo.png" class="logo-img" alt="Keye">
  </button>
  <span id="firm-badge"></span>
  <div class="header-right"></div>
</header>

<div id="app-body">

  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <nav class="sb-nav">
      <button class="sb-item" id="sb-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="3.25" width="14" height="1.5" rx="0.75" fill="currentColor"/>
            <rect x="1" y="7.25" width="14" height="1.5" rx="0.75" fill="currentColor"/>
            <rect x="1" y="11.25" width="14" height="1.5" rx="0.75" fill="currentColor"/>
          </svg>
        </span>
        <span class="sb-label">Toggle View</span>
      </button>

      <button class="sb-item" onclick="newSearch()" title="New chat">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="sb-label">New Chat</span>
      </button>

      <button class="sb-item" onclick="focusSearch()" title="Search">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10 10l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="sb-label">Search</span>
      </button>

      <button class="sb-item" onclick="focusChats()" title="Chats">
        <span class="sb-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 4a2 2 0 012-2h8a2 2 0 012 2v5a2 2 0 01-2 2H7l-3 3v-3H4a2 2 0 01-2-2V4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="sb-label">Chats</span>
      </button>
    </nav>

    <div class="sb-divider"></div>

    <div class="sb-section-label">Recents</div>
    <input id="sb-filter" placeholder="Filter recents…" oninput="filterRecents()">
    <div class="sb-recents" id="sb-recents"></div>
  </div>

  <!-- ── Content column ── -->
  <div id="content-col">

    <div id="main">
      <div id="empty-state">
        <p>Enter a firm name below.</p>
        <div id="landing-input-area">
          <textarea id="landing-textarea" placeholder="Firm name..."
                    rows="1" onkeydown="handleLandingKey(event)" oninput="autoResize(this)"></textarea>
          <button id="landing-send-btn" onclick="handleLandingSend()">↑</button>
        </div>
      </div>
      <div id="messages"></div>
    </div>

    <div class="input-bar" id="input-bar">
      <div class="input-inner">
        <textarea id="main-input" placeholder="Ask anything..."
                  rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="send-btn" onclick="handleSend()">↑</button>
      </div>
    </div>

  </div>
</div>

<script>
  const renderer = new marked.Renderer();
  renderer.link = ({ href, title, text }) =>
    `<a href="${href}"${title ? ` title="${title}"` : ''} target="_blank" rel="noopener noreferrer">${text}</a>`;
  marked.setOptions({ breaks: false, gfm: true, renderer });

  let context = null;
  let chatMessages = [];
  let isLoading = false;
  let currentChatId = null;

  const mainInput     = document.getElementById('main-input');
  const sendBtn       = document.getElementById('send-btn');
  const msgArea       = document.getElementById('messages');
  const emptyEl       = document.getElementById('empty-state');
  const firmBadge     = document.getElementById('firm-badge');
  const inputBar      = document.getElementById('input-bar');
  const sidebar       = document.getElementById('sidebar');
  const landingInput  = document.getElementById('landing-textarea');
  const landingSend   = document.getElementById('landing-send-btn');

  inputBar.style.display = 'none';

  loadRecentChats();
  landingInput.focus();

  // ── Sidebar ──────────────────────────────────────────────
  function toggleSidebar() {
    sidebar.classList.toggle('open');
  }
  function focusSearch() {
    if (!sidebar.classList.contains('open')) sidebar.classList.add('open');
    const filter = document.getElementById('sb-filter');
    if (filter) { filter.focus(); filter.select(); }
  }
  function focusChats() {
    if (context) {
      document.getElementById('main').scrollTop = document.getElementById('main').scrollHeight;
      mainInput.focus();
    } else {
      landingInput.focus();
    }
  }

  // ── Server-side recent chats ──────────────────────────────
  async function loadRecentChats() {
    try {
      const res = await fetch('/api/history');
      const data = await res.json();
      renderSidebarRecents(data.chats || []);
    } catch { /* fail silently */ }
  }
  async function createRecentChat(firm, ctx) {
    try {
      const res = await fetch('/api/history', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'create', firm, context: ctx }),
      });
      const data = await res.json();
      return data.id || null;
    } catch { return null; }
  }
  async function appendTurn(turn) {
    if (!currentChatId) return;
    try {
      await fetch('/api/history', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'append', id: currentChatId, turn }),
      });
    } catch { /* fail silently */ }
  }
  function renderSidebarRecents(chats) {
    const container = document.getElementById('sb-recents');
    container.innerHTML = '';
    chats.forEach(({ id, firm }) => {
      const btn = document.createElement('button');
      btn.className = 'sb-recent-item';
      btn.textContent = firm;
      btn.title = firm;
      btn.dataset.firm = (firm || '').toLowerCase();
      btn.onclick = () => { if (!isLoading) { if (id) loadChat(id); else doLookup(firm); } };
      container.appendChild(btn);
    });
  }
  function filterRecents() {
    const q = document.getElementById('sb-filter').value.toLowerCase().trim();
    document.querySelectorAll('.sb-recent-item').forEach(btn => {
      btn.style.display = (!q || btn.dataset.firm?.includes(q)) ? '' : 'none';
    });
  }

  // ── Color cues ───────────────────────────────────────────
  const C_GREEN  = '#3ecf8e';
  const C_ORANGE = '#f5a623';
  const C_RED    = '#e05252';

  function statusDotColor(text) {
    if (!text) return null;
    const t = text.toLowerCase();
    if (/active|onboard|ongoing|scheduled|confirmed|in progress|demo|pilot|trial|signed|advancing|engaged/.test(t)) return C_GREEN;
    if (/pending|follow.?up|waiting|stalled|proposal|evaluating|considering|outreach|intro|exploring/.test(t)) return C_ORANGE;
    if (/dormant|no.contact|cold|lost|churned|no.response|no prior|inactive/.test(t)) return C_RED;
    return null;
  }


  // ── Attendee name parsing ─────────────────────────────────
  function parseName(raw) {
    if (!raw || !raw.includes('@')) return raw || '';
    const user = raw.split('@')[0];
    return user.split('.').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  }

  // ── Input handlers ────────────────────────────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  }
  function handleLandingKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleLandingSend(); }
  }
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
  function handleSend() {
    if (isLoading) return;
    const text = mainInput.value.trim();
    if (!text) return;
    mainInput.value = '';
    mainInput.style.height = 'auto';
    if (text.toLowerCase().startsWith('/search ')) {
      doSearch(text.slice(8).trim());
    } else {
      doChat(text);
    }
  }
  function handleLandingSend() {
    if (isLoading) return;
    const text = landingInput.value.trim();
    if (!text) return;
    if (text.toLowerCase().startsWith('/search ')) {
      doSearch(text.slice(8).trim());
    } else {
      doLookup(text);
    }
  }
  function scrollBottom() {
    const main = document.getElementById('main');
    main.scrollTop = main.scrollHeight;
  }

  function showMessages() {
    emptyEl.style.display = 'none';
    msgArea.style.display = 'flex';
    inputBar.style.display = 'block';
  }

  // ── Add message ──────────────────────────────────────────
  function addMsg(role, content) {
    showMessages();
    const row = document.createElement('div');
    row.className = `msg ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (role === 'user') {
      bubble.textContent = content;
    } else if (typeof content === 'string') {
      bubble.innerHTML = marked.parse(content);
    } else {
      bubble.appendChild(content);
    }
    row.appendChild(bubble);
    msgArea.appendChild(row);
    scrollBottom();
    return row;
  }

  // ── Lookup ───────────────────────────────────────────────
  const STEPS = [
    "Searching Gmail across 6 accounts",
    "Reading email threads",
    "Scanning calendar history",
    "Identifying key contacts",
    "Analyzing with Claude",
  ];

  async function doLookup(firm) {
    isLoading = true;
    currentChatId = null;
    sendBtn.disabled = true;
    landingSend.disabled = true;

    addMsg('user', firm);

    const chain = document.createElement('div');
    chain.className = 'think-chain';
    const chainRow = addMsg('assistant', chain);

    let stepEls = [];
    let cancelled = false;

    STEPS.forEach((label, i) => {
      setTimeout(() => {
        if (cancelled) return;
        if (stepEls[i - 1]) stepEls[i - 1].classList.remove('active');
        const step = document.createElement('div');
        step.className = 'think-step active';
        step.innerHTML = `<div class="think-indicator"></div><span>${label}</span>`;
        chain.appendChild(step);
        stepEls.push(step);
        scrollBottom();
      }, i * 2400);
    });

    try {
      const res = await fetch('/api/lookup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ firm, mode: 'standard' }),
      });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();

      cancelled = true;
      chainRow.remove();
      renderResultCard(data);
      addMsg('assistant', 'What else would you like to know?');

      // Suggestion chips
      const chipsEl = document.createElement('div');
      chipsEl.className = 'suggestion-chips';
      ['Who are the key contacts?', 'Summarize the last meeting', 'Draft a follow-up email', 'What are the open blockers?'].forEach(label => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.textContent = label;
        btn.onclick = () => { chipsEl.remove(); doChat(label); };
        chipsEl.appendChild(btn);
      });
      msgArea.appendChild(chipsEl);

      // Search tip
      const tipEl = document.createElement('div');
      tipEl.className = 'search-tip';
      tipEl.innerHTML = `<span class="search-tip-icon">⌕</span><span>Type <code>/search [query]</code> to look up anyone at this firm — title, team, location, prior experience, and more.</span>`;
      msgArea.appendChild(tipEl);

      scrollBottom();

      context = { firm: data.firm, status: data.status, summary: data.summary, emails: data.emails, calendarEvents: data.calendarEvents, people: data.people || [] };
      currentChatId = await createRecentChat(data.firm, data);
      loadRecentChats();
      chatMessages = [];

      firmBadge.textContent = data.firm;
      firmBadge.style.display = 'block';
      mainInput.placeholder = `Ask anything, or /search [name] to look someone up…`;

    } catch (err) {
      cancelled = true;
      chainRow.remove();
      addMsg('assistant', `Error looking up **${firm}**: ${err.message}`);
    }

    isLoading = false;
    sendBtn.disabled = false;
    landingSend.disabled = false;
    mainInput.focus();
  }

  function renderResultCard(data) {
    const card = document.createElement('div');
    card.className = 'result-card';

    const firmEl = document.createElement('div');
    firmEl.className = 'result-firm';
    const firmName = document.createElement('span');
    firmName.textContent = data.mode === 'callprep' ? `${data.firm} — Call Prep` : data.firm;
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.textContent = 'Copy';
    copyBtn.onclick = () => {
      const items = card.querySelectorAll('.timeline-item');
      let plainText;
      if (items.length) {
        plainText = [...items].map(item => {
          const date = item.querySelector('.tl-date')?.textContent || '';
          const text = item.querySelector('.tl-text')?.textContent || '';
          return date ? `${date} ${text}` : text;
        }).join('\n');
      } else {
        plainText = card.querySelector('.result-section')?.innerText || '';
      }
      navigator.clipboard.writeText(plainText.trim()).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
      });
    };
    firmEl.appendChild(firmName);
    firmEl.appendChild(copyBtn);
    card.appendChild(firmEl);

    if (data.status) {
      const statusBar = document.createElement('div');
      statusBar.className = 'status-bar';
      const dotColor = statusDotColor(data.status);
      statusBar.innerHTML = `<span class="status-dot"${dotColor ? ` style="background:${dotColor}"` : ''}></span><span>${data.status}</span>`;
      card.appendChild(statusBar);
    }

    if (data.mode === 'callprep') {
      const section = document.createElement('div');
      section.className = 'result-section';
      section.innerHTML = marked.parse(data.summary || 'No call prep data available.');
      card.appendChild(section);
    } else {
      const emailSec = document.createElement('div');
      emailSec.className = 'result-section';
      emailSec.innerHTML = '<div class="section-label">Email History</div>';

      const timeline = document.createElement('div');
      timeline.className = 'timeline';

      if (data.summary) {
        data.summary.split('\n').filter(l => l.trim()).forEach(line => {
          const text = line.replace(/^-\s*/, '');
          const match = text.match(/^([A-Z][a-z]+ \d+(?:[–\-]\d+)?, \d{4}:)\s*([\s\S]*)/);
          const item = document.createElement('div');
          item.className = 'timeline-item';
          if (match) {
            item.innerHTML = `<span class="tl-dot"></span><span class="tl-date">${match[1]}</span><span class="tl-text">${match[2]}</span>`;
          } else {
            item.innerHTML = `<span class="tl-dot"></span><span class="tl-text">${text}</span>`;
          }
          timeline.appendChild(item);
        });
      } else {
        const item = document.createElement('div');
        item.className = 'timeline-item';
        item.innerHTML = '<span class="tl-text no-data">No email history found.</span>';
        timeline.appendChild(item);
      }

      emailSec.appendChild(timeline);
      card.appendChild(emailSec);

      const meetCount = data.calendarEvents?.length || 0;
      const collHeader = document.createElement('div');
      collHeader.className = 'collapsible-header';
      collHeader.setAttribute('data-open', 'false');
      collHeader.innerHTML = `<span class="section-label" style="margin-bottom:0">Meeting History (${meetCount})</span><span style="display:flex;align-items:center;gap:6px"><span class="collapsible-hint">expand</span><span class="collapsible-chevron">▸</span></span>`;

      const collBody = document.createElement('div');
      collBody.className = 'collapsible-body';

      collHeader.onclick = () => {
        const open = collHeader.getAttribute('data-open') === 'true';
        collHeader.setAttribute('data-open', String(!open));
        collBody.classList.toggle('open', !open);
        const hint = collHeader.querySelector('.collapsible-hint');
        if (hint) hint.textContent = open ? 'expand' : 'collapse';
      };

      if (meetCount) {
        data.calendarEvents.slice(0, 10).forEach(e => {
          const item = document.createElement('div');
          item.className = 'meeting-item';
          const date = new Date(e.start).toLocaleDateString('en-US', {
            weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
            hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York',
          });
          const peopleHtml = e.attendees.map(a => {
            const raw = a.name || a.email;
            const display = parseName(raw);
            return `<span title="${a.email || ''}">${display}</span>`;
          }).join(', ');
          item.innerHTML = `
            <span class="meeting-date">${date}</span>
            <span class="meeting-title">${e.title}</span>
            <span class="meeting-people">${peopleHtml}</span>
          `;
          collBody.appendChild(item);
        });
      } else {
        collBody.innerHTML = '<p class="no-data" style="padding-top:8px">No meetings found.</p>';
      }

      card.appendChild(collHeader);
      card.appendChild(collBody);
    }

    addMsg('assistant', card);
  }

  // ── Web Search ───────────────────────────────────────────
  async function doSearch(query) {
    if (!query) return;
    isLoading = true;
    sendBtn.disabled = true;

    addMsg('user', `/search ${query}`);

    const searchLoad = document.createElement('div');
    searchLoad.className = 'think-chain';
    searchLoad.innerHTML = `<div class="think-step active"><div class="think-indicator"></div><span>Searching the web…</span></div>`;
    const searchRow = addMsg('assistant', searchLoad);

    try {
      const res = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query,
          firm: context?.firm || null,
          summary: context?.summary || null,
          people: context?.people || [],
        }),
      });
      const data = await res.json();
      searchRow.remove();

      const wrapper = document.createElement('div');
      wrapper.innerHTML = `<div class="search-label">⌕ Web search</div>` + marked.parse(data.answer || 'No results found.');
      addMsg('assistant', wrapper);
      appendTurn({ type: 'search', user: query, assistant: data.answer || '' });
    } catch (err) {
      searchRow.remove();
      addMsg('assistant', `Search error: ${err.message}`);
    }

    isLoading = false;
    sendBtn.disabled = false;
    mainInput.focus();
  }

  // ── Chat ─────────────────────────────────────────────────
  async function doChat(text) {
    isLoading = true;
    sendBtn.disabled = true;

    addMsg('user', text);
    chatMessages.push({ role: 'user', content: text });

    const dots = document.createElement('div');
    dots.className = 'chat-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';
    const dotsRow = addMsg('assistant', dots);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: chatMessages, context }),
      });
      const data = await res.json();
      dotsRow.remove();

      const answer = data.answer || 'No response.';
      chatMessages.push({ role: 'assistant', content: answer });
      addMsg('assistant', answer);
      appendTurn({ type: 'chat', user: text, assistant: answer });
    } catch (err) {
      dotsRow.remove();
      addMsg('assistant', `Error: ${err.message}`);
    }

    isLoading = false;
    sendBtn.disabled = false;
    mainInput.focus();
  }

  // ── Load saved chat ──────────────────────────────────────
  async function loadChat(id) {
    if (isLoading) return;
    try {
      const res = await fetch(`/api/history?id=${encodeURIComponent(id)}`);
      const data = await res.json();
      if (!data.chat) return;
      const chat = data.chat;

      // Reset to clean state
      context = null;
      chatMessages = [];
      callPrepMode = false;
      currentChatId = chat.id;
      msgArea.innerHTML = '';
      msgArea.style.display = 'none';
      emptyEl.style.display = 'flex';
      inputBar.style.display = 'none';
      firmBadge.style.display = 'none';
      landingInput.value = '';
      landingInput.style.height = 'auto';

      const ctx = chat.context || {};
      context = {
        firm: ctx.firm || chat.firm,
        status: ctx.status,
        summary: ctx.summary,
        emails: ctx.emails || [],
        calendarEvents: ctx.calendarEvents || [],
        people: ctx.people || [],
      };

      addMsg('user', ctx.mode === 'callprep' ? `Call prep: ${chat.firm}` : chat.firm);
      renderResultCard({ ...ctx, firm: chat.firm });
      addMsg('assistant', 'What else would you like to know?');

      for (const turn of (chat.turns || [])) {
        if (turn.type === 'chat') {
          addMsg('user', turn.user);
          addMsg('assistant', turn.assistant);
          chatMessages.push({ role: 'user', content: turn.user });
          chatMessages.push({ role: 'assistant', content: turn.assistant });
        } else if (turn.type === 'search') {
          addMsg('user', `/search ${turn.user}`);
          const wrapper = document.createElement('div');
          wrapper.innerHTML = `<div class="search-label">⌕ Web search</div>` + marked.parse(turn.assistant || '');
          addMsg('assistant', wrapper);
        }
      }

      firmBadge.textContent = chat.firm;
      firmBadge.style.display = 'block';
      mainInput.placeholder = `Ask anything, or /search [name] to look someone up…`;
      scrollBottom();
      mainInput.focus();
    } catch (err) {
      console.error('loadChat error:', err);
    }
  }

  // ── Reset ────────────────────────────────────────────────
  function newSearch() {
    context = null;
    chatMessages = [];
    currentChatId = null;
    msgArea.innerHTML = '';
    msgArea.style.display = 'none';
    emptyEl.style.display = 'flex';
    inputBar.style.display = 'none';
    firmBadge.style.display = 'none';
    landingInput.value = '';
    landingInput.style.height = 'auto';
    loadRecentChats();
    landingInput.focus();
  }
</script>
</body>
</html>
